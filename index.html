  }

  .hero-gradient {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      transparent 30%,
      rgba(13,13,13,0.7) 65%,
      var(--preto) 100%
    );
    z-index: 1;
  }

  /* estrelas animadas */
  .stars {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }
  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--dur, 3s) ease-in-out infinite;
    opacity: 0;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; } 50% { opacity: 0.9; }
  }

  .hero-content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    text-align: center;
    padding: 0 20px;
  }

  .hero-logo {
    width: min(300px, 72vw);
    filter: drop-shadow(0 0 28px rgba(245,160,0,0.6));
    animation: float 4s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .hero-tagline {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(14px, 4vw, 18px);
    font-weight: 600;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--areia);
  }

  .hero-tagline span {
    color: var(--laranja);
  }

  /* ── DIVISOR DECORATIVO ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 24px;
    margin: 8px 0;
  }
  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--laranja), transparent);
  }
  .divider-icon {
    color: var(--laranja);
    font-size: 20px;
  }

  /* ── CARDÁPIO ── */
  .cardapio {
    padding: 60px 20px;
    max-width: 900px;
    margin: 0 auto;
  }

  .section-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    color: var(--laranja);
    text-align: center;
    margin-bottom: 8px;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 9vw, 64px);
    color: var(--amarelo);
    text-align: center;
    line-height: 1;
    margin-bottom: 48px;
    letter-spacing: 0.03em;
  }

  .pratos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 32px;
  }

  .prato-card {
    position: relative;
    background: linear-gradient(160deg, #1a1208 0%, #0f0c05 100%);
    border: 1px solid rgba(245,160,0,0.15);
    border-radius: 4px;
    padding: 0 0 28px;
    overflow: hidden;
    transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
    cursor: default;
  }

  .prato-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 50%, rgba(245,160,0,0.04) 100%);
    pointer-events: none;
  }

  .prato-card:hover {
    transform: translateY(-6px);
    border-color: rgba(245,160,0,0.45);
    box-shadow: 0 16px 40px rgba(245,160,0,0.12);
  }

  .prato-img-wrap {
    width: 100%;
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    overflow: visible;
    padding-top: 12px;
  }

  .prato-img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: bottom center;
    transition: transform 0.4s ease;
    filter: drop-shadow(0 8px 24px rgba(0,0,0,0.7));
  }

  .prato-card:hover .prato-img {
    transform: scale(1.05) translateY(-4px);
  }

  .prato-info {
    padding: 20px 20px 0;
    text-align: center;
  }

  .prato-nome {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    color: var(--laranja);
    letter-spacing: 0.05em;
    line-height: 1.1;
    margin-bottom: 6px;
  }

  .prato-desc {
    font-size: 13px;
    color: rgba(196,152,90,0.75);
    line-height: 1.5;
  }

  /* ── REDES SOCIAIS ── */
  .redes {
    padding: 60px 20px 80px;
    text-align: center;
  }

  .redes-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(28px, 7vw, 48px);
    color: var(--branco);
    letter-spacing: 0.04em;
    margin-bottom: 36px;
  }

  .redes-title span { color: var(--laranja); }

  .links-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    max-width: 380px;
    margin: 0 auto;
  }

  .link-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 16px 28px;
    border-radius: 3px;
    text-decoration: none;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .link-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.2s;
  }

  .link-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    filter: brightness(1.08);
  }

  .link-btn:hover::after {
    background: rgba(255,255,255,0.06);
  }

  .btn-whatsapp {
    background: #1A7C3E;
    color: #fff;
    border: 1px solid #2aad5a;
  }

  .btn-instagram {
    background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
    color: #fff;
    border: none;
  }

  .btn-tiktok {
    background: #010101;
    color: #fff;
    border: 1px solid #333;
  }

  .btn-icon {
    width: 22px;
    height: 22px;
    fill: currentColor;
    flex-shrink: 0;
  }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid rgba(245,160,0,0.1);
    padding: 28px 20px;
    text-align: center;
    color: rgba(196,152,90,0.4);
    font-size: 12px;
    letter-spacing: 0.08em;
    font-family: 'Barlow Condensed', sans-serif;
  }

  /* ── SCROLL REVEAL ── */
  .reveal {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  @media (max-width: 500px) {
    .pratos-grid { gap: 20px; }
  }
</style>
</head>

<script>
  // Estrelas
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `
      left: ${Math.random()*100}%;
      top: ${Math.random()*60}%;
      --dur: ${2 + Math.random()*4}s;
      animation-delay: ${Math.random()*5}s;
      width: ${1 + Math.random()*2}px;
      height: ${1 + Math.random()*2}px;
    `;
    starsEl.appendChild(s);
  }

  // Scroll reveal
  const reveals = document.querySelectorAll('.reveal');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((e, i) => {
      if (e.isIntersecting) {
        setTimeout(() => e.target.classList.add('visible'), i * 80);
        observer.unobserve(e.target);
      }
    });
  }, { threshold: 0.1 });
  reveals.forEach(el => observer.observe(el));
</script>
