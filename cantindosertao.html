<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cantin do Sertão</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --laranja:   #F5A000;
    --amarelo:   #F7C820;
    --preto:     #0D0D0D;
    --areia:     #C4985A;
    --creme:     #F5ECD7;
    --branco:    #FFFFFF;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--preto);
    color: var(--creme);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HERO ── */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding-bottom: 60px;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background-image: url('data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wBDAAYEBQYFBAYGBQYHBwYIChAKCgkJChQODwwQFxQYGBcUFhYaHSUfGhsjHBYWICwgIyYnKSopGR8tMC0oMCUoKSj/2wBDAQcHBwoIChMKChMoGhYaKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCgoKCj/wAARCAABAAEDASIAAhEBAxEB/8QAFQABAQAAAAAAAAAAAAAAAAAAAAv/xAAUEAEAAAAAAAAAAAAAAAAAAAAA/8VAFQEBAQAAAAAAAAAAAAAAAAAAAAX/xAAUEQEAAAAAAAAAAAAAAAAAAAAA/9oADAMBAAIRAxEAPwCwAA8A/9k');
    background-size: cover;
    background-position: center top;
    filter: brightness(0.35) saturate(0.8);
    z-index: 0;
  }

  .hero-gradient {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      transparent 30%,
      rgba(13,13,13,0.7) 65%,
      var(--preto) 100%
    );
    z-index: 1;
  }

  /* estrelas animadas */
  .stars {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }
  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--dur, 3s) ease-in-out infinite;
    opacity: 0;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0; } 50% { opacity: 0.9; }
  }

  .hero-content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    text-align: center;
    padding: 0 20px;
  }

  .hero-logo {
    width: min(300px, 72vw);
    filter: drop-shadow(0 0 28px rgba(245,160,0,0.6));
    animation: float 4s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }

  .hero-tagline {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(14px, 4vw, 18px);
    font-weight: 600;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--areia);
  }

  .hero-tagline span {
    color: var(--laranja);
  }

  /* ── DIVISOR DECORATIVO ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 0 24px;
    margin: 8px 0;
  }
  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--laranja), transparent);
  }
  .divider-icon {
    color: var(--laranja);
    font-size: 20px;
  }

  /* ── REDES SOCIAIS ── */
  .redes {
    padding: 60px 20px 80px;
    text-align: center;
  }

  .redes-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(28px, 7vw, 48px);
    color: var(--branco);
    letter-spacing: 0.04em;
    margin-bottom: 36px;
  }

  .redes-title span { color: var(--laranja); }

  .links-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    max-width: 380px;
    margin: 0 auto;
  }

  .link-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 16px 28px;
    border-radius: 3px;
    text-decoration: none;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .link-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.2s;
  }

  .link-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    filter: brightness(1.08);
  }

  .link-btn:hover::after {
    background: rgba(255,255,255,0.06);
  }

  .btn-whatsapp {
    background: #1A7C3E;
    color: #fff;
    border: 1px solid #2aad5a;
  }

  .btn-instagram {
    background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
    color: #fff;
    border: none;
  }

  .btn-tiktok {
    background: #010101;
    color: #fff;
    border: 1px solid #333;
  }

  .btn-icon {
    width: 22px;
    height: 22px;
    fill: currentColor;
    flex-shrink: 0;
  }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid rgba(245,160,0,0.1);
    padding: 28px 20px;
    text-align: center;
    color: rgba(196,152,90,0.4);
    font-size: 12px;
    letter-spacing: 0.08em;
    font-family: 'Barlow Condensed', sans-serif;
  }

  /* ── SCROLL REVEAL ── */
  .reveal {
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  @media (max-width: 500px) {
    .pratos-grid { gap: 20px; }
  }
</style>
</head>

<section class="hero">
